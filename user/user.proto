syntax = "proto3";

package user;

option go_package = "github.com/polyarn1y/proto/gen/user";

service UserService {
    rpc CreateUser(CreateUserRequest) returns (CreateUserResponse);
    rpc GetByID(GetByIDRequest) returns (GetByIDResponse);
}

message CreateUserRequest {
    string name = 1;
    string email = 2;
    string password = 3;
    uint32 age = 4;
}

message CreateUserResponse {
    string id = 1;
    string name = 2;
    string email = 3;
    uint32 age = 4;
}

message GetByIDRequest {
    string id = 1;
}

message GetByIDResponse {
    string id = 1;
    string name = 2;
    string email = 3;
    uint32 age = 4;
}